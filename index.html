        function getCampaignsForDate(date) {
            const dayOfMonth = date.getDate();
            const dayOfWeek = date.getDay(); 
            return CAMPAIGNS.filter(camp => {
                if (camp.dates && camp.dates.includes(dayOfMonth)) return true;
                if (camp.dayOfWeek !== undefined && camp.dayOfWeek === dayOfWeek) return true;
                return false;
            });
        }

        function isSameDate(d1, d2) { return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate(); }

        function getWeekRange(date) {
            const d = new Date(date);
            const day = d.getDay();
            const start = new Date(d);
            start.setDate(d.getDate() - day);
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            return { start, end };
        }

        function switchTab(tabId) {
            window.scrollTo({ top: 0, behavior: 'instant' });

            currentTab = tabId;
            const titles = { 'calendar': '定期キャンペーン', 'today': '本日のキャンペーン', 'dictionary': 'キャンペーン説明' };
            document.getElementById('header-title').textContent = titles[tabId];
            
            ['calendar', 'today', 'dictionary'].forEach(t => {
                const section = document.getElementById(`tab-${t}`);
                const navBtn = document.getElementById(`nav-${t}`);
                if (t === tabId) {
                    section.classList.remove('page-hidden');
                    section.classList.add('page-active');
                    navBtn.classList.replace('text-slate-400', 'text-aeon-primary');
                    navBtn.classList.add('transform', '-translate-y-1');
                } else {
                    section.classList.remove('page-active');
                    section.classList.add('page-hidden');
                    navBtn.classList.replace('text-aeon-primary', 'text-slate-400');
                    navBtn.classList.remove('transform', '-translate-y-1');

            });

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            let titleText = `${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月`;
            if (calendarMode === 'week') {
                const { start, end } = getWeekRange(currentDate);
                if (start.getMonth() !== end.getMonth()) titleText = `${start.getMonth()+1}/${start.getDate()} - ${end.getMonth()+1}/${end.getDate()}`;
                else titleText = `${currentDate.getMonth() + 1}月`;
            }
            document.getElementById('calendar-title').textContent = titleText;

            let daysToRender = [];
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();

            if (calendarMode === 'month') {
                const firstDay = new Date(y, m, 1);
                const lastDay = new Date(y, m + 1, 0);
                for (let i = 0; i < firstDay.getDay(); i++) daysToRender.push({ date: new Date(y, m, 0 - (firstDay.getDay() - 1 - i)), isCurrentM: false });
                for (let i = 1; i <= lastDay.getDate(); i++) daysToRender.push({ date: new Date(y, m, i), isCurrentM: true });
                const remaining = 42 - daysToRender.length;
                for (let i = 1; i <= remaining; i++) daysToRender.push({ date: new Date(y, m + 1, i), isCurrentM: false });
            } else {
                return; 
            }

            const today = new Date();
            daysToRender.forEach(item => {
                const d = item.date;
                const isSelected = isSameDate(d, selectedDate);
                const isTdy = isSameDate(d, today);
                const camps = getCampaignsForDate(d);

                const cell = document.createElement('button');
                cell.onclick = () => {
                    selectedDate = new Date(d);
                    renderCalendar(); 
                    renderScheduleList();
                };

                let bgClass = "bg-transparent";
                let textClass = item.isCurrentM ? "text-slate-800" : "text-slate-300";
                let weightClass = "font-bold";

                if (isSelected) { bgClass = "bg-aeon-primary shadow-md"; textClass = "text-white"; weightClass = "font-black"; } 
                else if (isTdy) { bgClass = "bg-pink-50"; textClass = "text-aeon-primary"; weightClass = "font-black"; } 
                else {
                    if(d.getDay() === 0 && item.isCurrentM) textClass = "text-red-500";
                    if(d.getDay() === 6 && item.isCurrentM) textClass = "text-blue-500";
                }

                cell.className = `relative w-full h-[42px] flex flex-col items-center justify-center rounded-[14px] transition-all active:scale-90 ${bgClass}`;
                
                const dots = camps.slice(0, 3).map(c => `<div class="w-1.5 h-1.5 rounded-full ${c.dotColor} mb-0.5"></div>`).join('');
                
                cell.innerHTML = `
                    <span class="text-sm ${textClass} ${weightClass} -mt-1">${d.getDate()}</span>
                    <div class="absolute bottom-1 flex justify-center space-x-0.5 w-full px-1 flex-wrap">
                        ${dots}
                    </div>
                `;
                grid.appendChild(cell);
            });
        }

                badgeContainer.innerHTML = `
                    <span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span></span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Today</span>
                `;
            } else {
                badgeContainer.innerHTML = `
                    <i data-lucide="calendar-days" class="w-3 h-3"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">表示中の日</span>
                `;
            }

            const camps = getCampaignsForDate(todayViewDate);
            const list = document.getElementById('today-campaigns-list');
            list.innerHTML = '';

            if (camps.length === 0) {
                document.getElementById('today-hero-desc').textContent = "本日は案内する定期キャンペーンはありません";
            } else {
                document.getElementById('today-hero-desc').textContent = `${isRealToday ? '本日' : 'この日'} ${camps.length}件 のキャンペーンを実施中`;
                camps.forEach(camp => {
                    const card = document.createElement('div');
                    card.className = `bg-white p-4 rounded-3xl shadow-soft border border-slate-50 flex items-center justify-between active:scale-[0.98] transition cursor-pointer`;
                    card.onclick = () => openSheet(camp);
                    card.innerHTML = `
                        <div class="flex items-center space-x-3.5">
                            <div class="${camp.color} text-white w-12 h-12 rounded-[20px] shadow-inner flex items-center justify-center shrink-0">
                                <i data-lucide="${camp.icon}" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h4 class="text-[15px] font-black text-slate-800 tracking-tight">${camp.title}</h4>
                                <p class="text-xs font-black ${camp.text} mt-0.5 bg-slate-50 inline-block px-1.5 py-0.5 rounded border border-slate-100">${camp.benefit}</p>
                            </div>
                        </div><i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                    `;
                    list.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        function buildDictionary() {
            const list = document.getElementById('dictionary-list');
            list.innerHTML = '';
            CAMPAIGNS.forEach(camp => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[28px] shadow-sm border border-slate-100 active:scale-[0.98] transition-transform cursor-pointer flex flex-col mb-4";
                card.onclick = () => openSheet(camp);
                card.innerHTML = `
                    <div class="flex items-center space-x-4 mb-3.5">
                        <div class="${camp.color} text-white w-12 h-12 rounded-[20px] flex items-center justify-center shadow-inner shrink-0">
                            <i data-lucide="${camp.icon}" class="w-6 h-6"></i>
                        </div>
                        <h4 class="text-base font-black text-slate-800 tracking-tight">${camp.title}</h4>
                    </div>
                    <div class="flex items-center justify-between ml-[64px] bg-slate-50/80 px-3 py-2 rounded-[14px] border border-slate-100/50">
                         <span class="text-[10px] text-slate-500 font-bold tracking-wider">${camp.subtitle}</span>
                         <span class="text-xs font-black ${camp.text}">${camp.benefit}</span>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openSheet(camp) {
            document.getElementById('sheet-title').textContent = camp.title;
            document.getElementById('sheet-subtitle').textContent = camp.subtitle;
            document.getElementById('sheet-benefit').textContent = camp.benefit;
            document.getElementById('sheet-icon-box').className = `w-12 h-12 rounded-[20px] flex items-center justify-center text-white shrink-0 shadow-inner ${camp.color}`;
            document.getElementById('sheet-icon-box').innerHTML = `<i data-lucide="${camp.icon}" class="w-6 h-6"></i>`;
            
            document.getElementById('sheet-tips').textContent = camp.tips;

            const conditionsHtml = camp.conditions.map(c => `<li class="flex items-start space-x-2.5"><span class="text-emerald-500 mt-0.5 text-lg leading-none">•</span><span class="pt-0.5">${c}</span></li>`).join('');
            document.getElementById('sheet-conditions').innerHTML = conditionsHtml;

            const exclusionsContainer = document.getElementById('sheet-exclusions-container');
            if (camp.exclusions && camp.exclusions.length > 0) {
                exclusionsContainer.classList.remove('hidden');
                const exclusionsHtml = camp.exclusions.map(c => `<li class="flex items-start space-x-2.5"><span class="text-red-500 mt-0.5 text-[10px] font-black">※</span><span class="pt-0.5">${c}</span></li>`).join('');
                document.getElementById('sheet-exclusions').innerHTML = exclusionsHtml;
            } else {
                exclusionsContainer.classList.add('hidden');
            }

            activeUrlToOpen = camp.url || BASE_URL;

            const sheet = document.getElementById('bottom-sheet');
            const backdrop = document.getElementById('sheet-backdrop');
            const content = document.getElementById('sheet-content');
            
            sheet.classList.remove('pointer-events-none');
            backdrop.classList.remove('opacity-0');
            backdrop.classList.add('opacity-100');
            content.classList.remove('translate-y-full');
            lucide.createIcons();
        }

        function closeSheet() {
            const sheet = document.getElementById('bottom-sheet');
            const backdrop = document.getElementById('sheet-backdrop');
            const content = document.getElementById('sheet-content');
            
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            setTimeout(() => { sheet.classList.add('pointer-events-none'); }, 300);
        }

        function openOfficialSiteFromSheet() {
            try { window.open(activeUrlToOpen, '_blank', 'noopener,noreferrer'); } 
            catch (e) {
                const a = document.createElement('a');
                a.href = activeUrlToOpen; a.target = '_blank'; a.rel = 'noopener noreferrer';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }
        }
    </script>
</body>
</html>
